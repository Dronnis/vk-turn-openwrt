name: Build OpenWRT Packages (23.05 / 24.10 / 25.12)

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - 'packages/**/Makefile'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild'
        type: boolean
        default: false
      target_version:
        description: 'Upstream version to build (e.g., 2.0.6)'
        type: string

env:
  UPSTREAM_REPO: kiper292/vk-turn-proxy
  VERSION_FILE: .upstream-version
  PACKAGES: "vk-turn-server vk-turn-client"
  OPENWRT_VERSIONS: "['23.05.6', '24.10.6', '25.12.2']" 
jobs:
  # 1️⃣ Проверка обновлений upstream
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get latest upstream version
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest | jq -r .tag_name | sed 's/^v//')
          CURRENT=$(cat ${{ env.VERSION_FILE }} 2>/dev/null || echo "0.0.0")
          FORCE="${{ github.event.inputs.force_rebuild }}"
          TARGET="${{ github.event.inputs.target_version }}"
          
          echo "🔍 Upstream: $LATEST | Packaged: $CURRENT"
          
          if [ -n "$TARGET" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "version=$TARGET" >> $GITHUB_OUTPUT
          elif [ "$LATEST" != "$CURRENT" ] || [ "$FORCE" = "true" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

  # 2️⃣ Обновление PKG_VERSION в Makefile
  update-makefiles:
    needs: check-updates
    if: needs.check-updates.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
      
      - name: Bump PKG_VERSION
        run: |
          VER="${{ needs.check-updates.outputs.version }}"
          for pkg in ${{ env.PACKAGES }}; do
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER/" "packages/$pkg/Makefile"
          done
          echo "$VER" > ${{ env.VERSION_FILE }}
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/Makefile ${{ env.VERSION_FILE }}
          git commit -m "chore: bump to upstream v${VER} [skip ci]" || echo "No changes"
          git push

  # 3️⃣ Сборка пакетов под разные версии OpenWRT и архитектуры
  build:
    needs: [check-updates, update-makefiles]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        openwrt_version: ['23.05.5', '24.10.0', '25.12.0']
        package: [vk-turn-server, vk-turn-client]
        arch: [amd64, arm64, arm, mips, mipsle, 386]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SDK target & arch
        id: sdk_info
        run: |
          # Маппинг: наша архитектура → target в OpenWRT SDK
          case "${{ matrix.arch }}" in
            amd64)
              TARGET="x86/64"
              UPSTREAM_ARCH="amd64"
              ;;
            arm64)
              TARGET="armsr/armv8"
              UPSTREAM_ARCH="arm64"
              ;;
            arm)
              # arm_cortex-a9_vfpv3-d16 — наиболее совместимый для generic ARM
              TARGET="mvebu/cortexa9"
              UPSTREAM_ARCH="arm"
              ;;
            mips)
              TARGET="ath79/generic"
              UPSTREAM_ARCH="mips"
              ;;
            mipsle)
              TARGET="ramips/mt7621"
              UPSTREAM_ARCH="mipsle"
              ;;
            386)
              TARGET="x86/generic"
              UPSTREAM_ARCH="386"
              ;;
            *)
              echo "❌ Unknown architecture: ${{ matrix.arch }}"
              exit 1
              ;;
          esac
          
          echo "target=${TARGET}" >> $GITHUB_OUTPUT
          echo "upstream_arch=${UPSTREAM_ARCH}" >> $GITHUB_OUTPUT
          echo "🎯 Target: ${TARGET} | Upstream binary: ${UPSTREAM_ARCH}"

      - name: Download OpenWRT SDK
        run: |
          VER="${{ matrix.openwrt_version }}"
          TARGET="${{ steps.sdk_info.outputs.target }}"
          
          # Страница со списком файлов для target
          BASE_URL="https://downloads.openwrt.org/releases/${VER}/targets/${TARGET}"
          
          # Парсим имя файла SDK (единственный файл с "sdk-" и ".tar.xz")
          SDK_FILE=$(curl -s "${BASE_URL}/" | grep -oP 'openwrt-sdk-[^"]+\.tar\.xz' | head -1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "❌ SDK not found for ${VER}/${TARGET}"
            echo "🔍 Available files:"
            curl -s "${BASE_URL}/" | grep -oP 'href="[^"]+\.(tar\.xz|sha256sums)"' | head -20
            exit 1
          fi
          
          SDK_URL="${BASE_URL}/${SDK_FILE}"
          echo "⬇️ Downloading: $SDK_URL"
          
          # Скачиваем с повторными попытками
          wget -q --timeout=60 --tries=3 -O sdk.tar.xz "$SDK_URL"
          
          # Проверяем контрольную сумму если есть файл
          if curl -s -f "${SDK_URL}.sha256sums" -o checksums.txt 2>/dev/null; then
            grep "$(basename "$SDK_FILE")" checksums.txt | sha256sum -c && echo "✅ Checksum OK" || echo "⚠️ Checksum mismatch"
          fi
          
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt
          rm -f sdk.tar.xz checksums.txt

      - name: Prepare package & build
        run: |
          VER="${{ needs.check-updates.outputs.version }}"
          PKG="${{ matrix.package }}"
          OWRT="${{ matrix.openwrt_version }}"
          UPSTREAM_ARCH="${{ steps.sdk_info.outputs.upstream_arch }}"
          
          # Копируем пакет в SDK
          mkdir -p openwrt/package/custom/$PKG
          cp -r packages/$PKG/* openwrt/package/custom/$PKG/
          
          # Обновляем версию и архитектуру в Makefile
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER/" openwrt/package/custom/$PKG/Makefile
          
          # Настраиваем feeds
          echo "src-link custom $GITHUB_WORKSPACE/openwrt/package/custom" >> openwrt/feeds.conf.default
          
          cd openwrt
          
          # Обновляем и устанавливаем feeds
          ./scripts/feeds update -a 2>/dev/null || true
          ./scripts/feeds install -a 2>/dev/null || true
          
          # Базовая конфигурация
          make defconfig
          
          # Сборка пакета
          make package/custom/$PKG/compile V=s
          
          # Сбор и переименование артефактов
          mkdir -p ../output
          find bin/packages -name "${PKG}_*.ipk" -exec cp {} ../output/ \;
          cd ../output
          
          # Переименовываем: добавляем версию OpenWRT и архитектуру
          for f in ${PKG}_*.ipk; do
            NEW_NAME="${f%.ipk}_${OWRT}_${{ matrix.arch }}.ipk"
            mv "$f" "$NEW_NAME"
            echo "📦 Renamed: $f → $NEW_NAME"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.arch }}-${{ matrix.openwrt_version }}
          path: output/*.ipk
          retention-days: 7

  # 4️⃣ Публикация релиза
  release:
    needs: [check-updates, build]
    if: needs.check-updates.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files
          merge-multiple: true

      - name: Generate release notes
        run: |
          VER="${{ needs.check-updates.outputs.version }}"
          cat > notes.md <<EOF
          ## 📦 vk-turn-proxy for OpenWRT v${VER}
          
          > Бинарники взяты из [upstream release v${VER}](https://github.com/${{ env.UPSTREAM_REPO }}/releases/tag/v${VER})
          
          ### 📂 Пакеты по версиям OpenWRT
          EOF
          
          for owrt in 23.05.5 24.10.0 25.12.0; do
            echo -e "\n#### OpenWRT ${owrt%%.*}.x" >> notes.md
            echo '```' >> notes.md
            find ./release-files -name "*_${owrt}.ipk" -exec basename {} \; | sort | sed 's/^/  /' >> notes.md
            echo '```' >> notes.md
          done
          
          echo -e "\n### ⚙️ Установка" >> notes.md
          echo '```bash' >> notes.md
          echo 'wget <ссылка_на_файл.ipk>' >> notes.md
          echo 'opkg install *.ipk' >> notes.md
          echo '```' >> notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openwrt-v${{ needs.check-updates.outputs.version }}
          name: "📦 OpenWRT Packages v${{ needs.check-updates.outputs.version }}"
          body_path: notes.md
          files: release-files/*.ipk
          draft: false
          prerelease: false
          token: ${{ secrets.TOKEN }}