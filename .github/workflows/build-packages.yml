name: Build OpenWRT Packages (23.05 / 24.10 / 25.12)

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - 'packages/**/Makefile'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild'
        type: boolean
        default: false
      target_version:
        description: 'Upstream version to build (e.g., 2.0.6)'
        type: string

env:
  UPSTREAM_REPO: kiper292/vk-turn-proxy
  VERSION_FILE: .upstream-version
  PACKAGES: "vk-turn-server vk-turn-client"

jobs:
  # 1️⃣ Проверка обновлений upstream
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get latest upstream version
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest | jq -r .tag_name | sed 's/^v//')
          CURRENT=$(cat ${{ env.VERSION_FILE }} 2>/dev/null || echo "0.0.0")
          FORCE="${{ github.event.inputs.force_rebuild }}"
          TARGET="${{ github.event.inputs.target_version }}"
          
          echo "🔍 Upstream: $LATEST | Packaged: $CURRENT"
          
          if [ -n "$TARGET" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "version=$TARGET" >> $GITHUB_OUTPUT
          elif [ "$LATEST" != "$CURRENT" ] || [ "$FORCE" = "true" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

  # 2️⃣ Обновление PKG_VERSION в Makefile
  update-makefiles:
    needs: check-updates
    if: needs.check-updates.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
      
      - name: Bump PKG_VERSION
        run: |
          VER="${{ needs.check-updates.outputs.version }}"
          for pkg in ${{ env.PACKAGES }}; do
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER/" "packages/$pkg/Makefile"
          done
          echo "$VER" > ${{ env.VERSION_FILE }}
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/Makefile ${{ env.VERSION_FILE }}
          git commit -m "chore: bump to upstream v${VER} [skip ci]" || echo "No changes"
          git push

  # 3️⃣ Сборка пакетов
  build:
    needs: [check-updates, update-makefiles]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        openwrt_version: ['23.05.5', '24.10.6', '25.12.2']
        package: [vk-turn-server, vk-turn-client]
        arch: [amd64, arm64, arm, mips, mipsle, 386]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Map architecture to OpenWRT target path
        id: target_map
        run: |
          ARCH="${{ matrix.arch }}"
          case "$ARCH" in
            amd64)   echo "target_path=x86/64" >> $GITHUB_OUTPUT ;;
            arm64)   echo "target_path=armsr/armv8" >> $GITHUB_OUTPUT ;;
            arm)     echo "target_path=mvebu/cortexa9" >> $GITHUB_OUTPUT ;;
            mips)    echo "target_path=ath79/generic" >> $GITHUB_OUTPUT ;;
            mipsle)  echo "target_path=ramips/mt7621" >> $GITHUB_OUTPUT ;;
            386)     echo "target_path=x86/generic" >> $GITHUB_OUTPUT ;;
          esac

      - name: Parse SDK download link from releases page
        id: sdk_link
        run: |
          OWRT="${{ matrix.openwrt_version }}"
          TARGET_PATH="${{ steps.target_map.outputs.target_path }}"
          BASE_URL="https://downloads.openwrt.org/releases/${OWRT}/targets/${TARGET_PATH}/"
          
          echo "🔍 Fetching: $BASE_URL"
          PAGE=$(curl -sL "$BASE_URL")
          
          # Парсим ссылку на SDK для нашей версии
          SDK_LINK=$(echo "$PAGE" | grep -oP 'href="openwrt-sdk-${OWRT}-[^"]+\.tar\.(xz|zst)"' | head -1 | sed 's/href="//;s/"//')
          
          if [ -z "$SDK_LINK" ]; then
            echo "❌ SDK not found for ${OWRT}/${TARGET_PATH}"
            echo "Available archives:"
            echo "$PAGE" | grep -oP 'href="[^"]+\.(tar\.xz|tar\.zst)"' | head -10
            exit 1
          fi
          
          FULL_URL="${BASE_URL}${SDK_LINK}"
          echo "✅ SDK: $SDK_LINK"
          
          # Определяем формат архива
          if [[ "$SDK_LINK" == *.zst ]]; then
            EXT="zst"
            EXTRACT_CMD="tar --zstd -xf"
          else
            EXT="xz"
            EXTRACT_CMD="tar -xf"
          fi
          
          echo "sdk_url=$FULL_URL" >> $GITHUB_OUTPUT
          echo "ext=$EXT" >> $GITHUB_OUTPUT
          echo "extract_cmd=$EXTRACT_CMD" >> $GITHUB_OUTPUT
          
          # Пакетный менеджер
          if [[ "$OWRT" == 25.12.* ]]; then
            echo "pkg_ext=apk" >> $GITHUB_OUTPUT
            echo "pkg_mgr=apk" >> $GITHUB_OUTPUT
          else
            echo "pkg_ext=ipk" >> $GITHUB_OUTPUT
            echo "pkg_mgr=opkg" >> $GITHUB_OUTPUT
          fi

      - name: Install zstd
        if: steps.sdk_link.outputs.ext == 'zst'
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Download & extract SDK
        run: |
          curl -L --retry 3 -o "sdk.tar.${{ steps.sdk_link.outputs.ext }}" \
            "${{ steps.sdk_link.outputs.sdk_url }}"
          ${{ steps.sdk_link.outputs.extract_cmd }} "sdk.tar.${{ steps.sdk_link.outputs.ext }}"
          mv openwrt-sdk-* openwrt
          rm "sdk.tar."*

      - name: Prepare package & compile
        run: |
          VER="${{ needs.check-updates.outputs.version }}"
          PKG="${{ matrix.package }}"
          OWRT="${{ matrix.openwrt_version }}"
          PKG_EXT="${{ steps.sdk_link.outputs.pkg_ext }}"
          
          # Копируем пакет
          mkdir -p openwrt/package/custom/$PKG
          cp -r packages/$PKG/* openwrt/package/custom/$PKG/
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER/" openwrt/package/custom/$PKG/Makefile
          
          # Feeds
          echo "src-link custom $GITHUB_WORKSPACE/openwrt/package/custom" >> openwrt/feeds.conf.default
          
          cd openwrt
          ./scripts/feeds update -a 2>/dev/null || true
          ./scripts/feeds install -a 2>/dev/null || true
          make defconfig
          make package/custom/$PKG/compile V=s
          
          # Собираем артефакты
          mkdir -p ../output
          find bin/packages -name "${PKG}_*.${PKG_EXT}" -exec cp {} ../output/ \;
          cd ../output
          for f in ${PKG}_*.${PKG_EXT}; do
            base="${f%.${PKG_EXT}}"
            mv "$f" "${base}_${OWRT}.${PKG_EXT}"
          done
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.arch }}-${{ matrix.openwrt_version }}
          path: output/*.${{ steps.sdk_link.outputs.pkg_ext }}
          retention-days: 7
          
  # 4️⃣ Публикация релиза
  release:
    needs: [check-updates, build]
    if: needs.check-updates.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files
          merge-multiple: true

      - name: Generate release notes
        run: |
          VER="${{ needs.check-updates.outputs.version }}"
          cat > notes.md <<'HEADER'
            ## 📦 vk-turn-proxy for OpenWRT v
          HEADER
          echo "HEADER" > notes.md
          echo "## 📦 vk-turn-proxy for OpenWRT v${VER}" > notes.md
          echo "" >> notes.md
          echo "> Бинарники взяты из [upstream release v${VER}](https://github.com/${{ env.UPSTREAM_REPO }}/releases/tag/v${VER})" >> notes.md
          echo "" >> notes.md
          
          for owrt in "23.05.5 (opkg)" "24.10.6 (opkg)" "25.12.2 (apk)"; do
            owrt_ver="${owrt%% *}"
            pkg_mgr="${owrt##* }"
            pkg_ext="ipk"
            [ "$pkg_mgr" = "apk" ] && pkg_ext="apk"
            
            echo -e "\n### 📂 OpenWRT ${owrt_ver} — ${pkg_mgr} (\`.${pkg_ext}\`)" >> notes.md
            echo '```' >> notes.md
            find ./release-files -name "*_${owrt_ver}.${pkg_ext}" -exec basename {} \; 2>/dev/null | sort | sed 's/^/  /' >> notes.md || echo "  (no packages)" >> notes.md
            echo '```' >> notes.md
          done
          
          echo -e "\n### ⚙️ Установка" >> notes.md
          echo '```bash' >> notes.md
          echo '# Для OpenWRT 23.05 / 24.10 (opkg):' >> notes.md
          echo 'opkg install vk-turn-client_*.ipk' >> notes.md
          echo '' >> notes.md
          echo '# Для OpenWRT 25.12+ (apk):' >> notes.md
          echo 'apk add --allow-untrusted vk-turn-client_*.apk' >> notes.md
          echo '```' >> notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openwrt-v${{ needs.check-updates.outputs.version }}
          name: "📦 OpenWRT Packages v${{ needs.check-updates.outputs.version }}"
          body_path: notes.md
          files: |
            release-files/*.ipk
            release-files/*.apk
          draft: false
          prerelease: false
          token: ${{ secrets.TOKEN }}
          fail_on_unmatched_files: false