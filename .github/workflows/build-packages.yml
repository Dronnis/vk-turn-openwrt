name: Build OpenWRT Packages (23.05 / 24.10 / 25.12)

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - 'packages/**/Makefile'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild'
        type: boolean
        default: false
      target_version:
        description: 'Upstream version to build (e.g., 2.0.6)'
        type: string

env:
  UPSTREAM_REPO: kiper292/vk-turn-proxy
  VERSION_FILE: .upstream-version
  PACKAGES: "vk-turn-server vk-turn-client"

jobs:
  # 1️⃣ Проверка обновлений upstream
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get latest upstream version
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest | jq -r .tag_name | sed 's/^v//')
          CURRENT=$(cat ${{ env.VERSION_FILE }} 2>/dev/null || echo "0.0.0")
          FORCE="${{ github.event.inputs.force_rebuild }}"
          TARGET="${{ github.event.inputs.target_version }}"
          
          echo "🔍 Upstream: $LATEST | Packaged: $CURRENT"
          
          if [ -n "$TARGET" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "version=$TARGET" >> $GITHUB_OUTPUT
          elif [ "$LATEST" != "$CURRENT" ] || [ "$FORCE" = "true" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

  # 2️⃣ Обновление PKG_VERSION в Makefile
  update-makefiles:
    needs: check-updates
    if: needs.check-updates.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
      
      - name: Bump PKG_VERSION
        run: |
          VER="${{ needs.check-updates.outputs.version }}"
          for pkg in ${{ env.PACKAGES }}; do
            sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER/" "packages/$pkg/Makefile"
          done
          echo "$VER" > ${{ env.VERSION_FILE }}
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/Makefile ${{ env.VERSION_FILE }}
          git commit -m "chore: bump to upstream v${VER} [skip ci]" || echo "No changes"
          git push

  # 3️⃣ Сборка пакетов
  build:
    needs: [check-updates, update-makefiles]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        openwrt_version: ['23.05.5', '24.10.6', '25.12.2']
        package: [vk-turn-server, vk-turn-client]
        arch: [amd64, arm64, arm, mips, mipsle, 386]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SDK info
        id: sdk_info
        run: |
          OWRT="${{ matrix.openwrt_version }}"
          ARCH="${{ matrix.arch }}"
          
          # Маппинг архитектур → target для SDK
          case "$ARCH" in
            amd64)   TARGET_PATH="x86/64";      TARGET_NAME="x86-64";      PKG_ARCH="x86_64" ;;
            arm64)   TARGET_PATH="armsr/armv8";  TARGET_NAME="armv8";       PKG_ARCH="aarch64_generic" ;;
            arm)     TARGET_PATH="mvebu/cortexa9"; TARGET_NAME="cortexa9";  PKG_ARCH="arm_cortex-a9_vfpv3-d16" ;;
            mips)    TARGET_PATH="ath79/generic"; TARGET_NAME="generic";    PKG_ARCH="mips_24kc" ;;
            mipsle)  TARGET_PATH="ramips/mt7621"; TARGET_NAME="mt7621";     PKG_ARCH="mipsel_24kc" ;;
            386)     TARGET_PATH="x86/generic";  TARGET_NAME="generic";     PKG_ARCH="i386_pentium4" ;;
          esac
          
          # Определяем версию GCC и musl для каждой версии OpenWRT
          case "$OWRT" in
            23.05.*) GCC_VER="12.3.0"; MUSL="musl"; EXT="xz" ;;
            24.10.*) GCC_VER="13.3.0"; MUSL="musl"; EXT="zst" ;;
            25.12.*) GCC_VER="14.3.0"; MUSL="musl"; EXT="zst" ;;
            *) GCC_VER="13.3.0"; MUSL="musl"; EXT="zst" ;;
          esac
          
          # Определяем формат пакета
          if [[ "$OWRT" == 25.12.* ]]; then
            PKG_EXT="apk"
            PKG_MGR="apk"
          else
            PKG_EXT="ipk"
            PKG_MGR="opkg"
          fi
          
          echo "target_path=$TARGET_PATH" >> $GITHUB_OUTPUT
          echo "target_name=$TARGET_NAME" >> $GITHUB_OUTPUT
          echo "pkg_arch=$PKG_ARCH" >> $GITHUB_OUTPUT
          echo "gcc_ver=$GCC_VER" >> $GITHUB_OUTPUT
          echo "ext=$EXT" >> $GITHUB_OUTPUT
          echo "pkg_ext=$PKG_EXT" >> $GITHUB_OUTPUT
          echo "pkg_mgr=$PKG_MGR" >> $GITHUB_OUTPUT

      - name: Install zstd (for .tar.zst)
        if: steps.sdk_info.outputs.ext == 'zst'
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Download OpenWRT SDK
        run: |
          OWRT="${{ matrix.openwrt_version }}"
          TARGET_PATH="${{ steps.sdk_info.outputs.target_path }}"
          TARGET_NAME="${{ steps.sdk_info.outputs.target_name }}"
          GCC="${{ steps.sdk_info.outputs.gcc_ver }}"
          EXT="${{ steps.sdk_info.outputs.ext }}"
          
          SDK_URL="https://downloads.openwrt.org/releases/${OWRT}/targets/${TARGET_PATH}/openwrt-sdk-${OWRT}-${TARGET_NAME}_gcc-${GCC}_musl.Linux-x86_64.tar.${EXT}"
          
          echo "⬇️ Downloading: $SDK_URL"
          curl -L --retry 3 --retry-delay 5 -o sdk.tar.${EXT} "$SDK_URL"
          
          if [ "$EXT" = "zst" ]; then
            tar --zstd -xf sdk.tar.zst
          else
            tar -xf sdk.tar.xz
          fi
          mv openwrt-sdk-* openwrt
          rm sdk.tar.*

      - name: Prepare package & build
        run: |
          VER="${{ needs.check-updates.outputs.version }}"
          PKG="${{ matrix.package }}"
          OWRT="${{ matrix.openwrt_version }}"
          PKG_EXT="${{ steps.sdk_info.outputs.pkg_ext }}"
          PKG_ARCH="${{ steps.sdk_info.outputs.pkg_arch }}"
          
          # Копируем пакет в SDK
          mkdir -p openwrt/package/custom/$PKG
          cp -r packages/$PKG/* openwrt/package/custom/$PKG/
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER/" openwrt/package/custom/$PKG/Makefile
          
          # Настраиваем feeds
          echo "src-link custom $GITHUB_WORKSPACE/openwrt/package/custom" >> openwrt/feeds.conf.default
          
          cd openwrt
          ./scripts/feeds update -a 2>/dev/null || true
          ./scripts/feeds install -a 2>/dev/null || true
          make defconfig
          make package/custom/$PKG/compile V=s
          
          # Копируем и переименовываем пакеты
          mkdir -p ../output
          find bin/packages -name "${PKG}_*.${PKG_EXT}" -exec cp {} ../output/ \;
          cd ../output
          for f in ${PKG}_*.${PKG_EXT}; do
            # Формат: имя_версия-релиз_архитектура_версия-OWRT.расширение
            base="${f%.${PKG_EXT}}"
            mv "$f" "${base}_${OWRT}.${PKG_EXT}"
          done
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-${{ matrix.arch }}-${{ matrix.openwrt_version }}
          path: output/*.${{ steps.sdk_info.outputs.pkg_ext }}
          retention-days: 7

  # 4️⃣ Публикация релиза
  release:
    needs: [check-updates, build]
    if: needs.check-updates.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files
          merge-multiple: true

      - name: Generate release notes
        run: |
          VER="${{ needs.check-updates.outputs.version }}"
          cat > notes.md <<'HEADER'
            ## 📦 vk-turn-proxy for OpenWRT v
          HEADER
          echo "HEADER" > notes.md
          echo "## 📦 vk-turn-proxy for OpenWRT v${VER}" > notes.md
          echo "" >> notes.md
          echo "> Бинарники взяты из [upstream release v${VER}](https://github.com/${{ env.UPSTREAM_REPO }}/releases/tag/v${VER})" >> notes.md
          echo "" >> notes.md
          
          for owrt in "23.05.5 (opkg)" "24.10.6 (opkg)" "25.12.2 (apk)"; do
            owrt_ver="${owrt%% *}"
            pkg_mgr="${owrt##* }"
            pkg_ext="ipk"
            [ "$pkg_mgr" = "apk" ] && pkg_ext="apk"
            
            echo -e "\n### 📂 OpenWRT ${owrt_ver} — ${pkg_mgr} (\`.${pkg_ext}\`)" >> notes.md
            echo '```' >> notes.md
            find ./release-files -name "*_${owrt_ver}.${pkg_ext}" -exec basename {} \; 2>/dev/null | sort | sed 's/^/  /' >> notes.md || echo "  (no packages)" >> notes.md
            echo '```' >> notes.md
          done
          
          echo -e "\n### ⚙️ Установка" >> notes.md
          echo '```bash' >> notes.md
          echo '# Для OpenWRT 23.05 / 24.10 (opkg):' >> notes.md
          echo 'opkg install vk-turn-client_*.ipk' >> notes.md
          echo '' >> notes.md
          echo '# Для OpenWRT 25.12+ (apk):' >> notes.md
          echo 'apk add --allow-untrusted vk-turn-client_*.apk' >> notes.md
          echo '```' >> notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openwrt-v${{ needs.check-updates.outputs.version }}
          name: "📦 OpenWRT Packages v${{ needs.check-updates.outputs.version }}"
          body_path: notes.md
          files: |
            release-files/*.ipk
            release-files/*.apk
          draft: false
          prerelease: false
          token: ${{ secrets.TOKEN }}
          fail_on_unmatched_files: false